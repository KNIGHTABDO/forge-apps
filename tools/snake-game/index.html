<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FORGE | Snake</title>
    <style>
        :root {
            --bg: #0a0a0a; --s1: #111111; --s2: #1a1a1a; --s3: #242424; --border: #1e293b;
            --text: #f1f5f9; --muted: #64748b; --accent: #3b82f6; --danger: #ef4444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .game-container { padding: 20px; text-align: center; }
        canvas { background: var(--s1); border: 2px solid var(--border); border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }
        .controls { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; margin-top: 20px; justify-content: center; }
        button { background: var(--s3); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; touch-action: manipulation; }
        button:active { background: var(--accent); }
        .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 10px; }
        .score-board { font-size: 20px; font-weight: 800; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="stats">
        <div class="score-board">Score: <span id="score">0</span></div>
        <div class="score-board">Level: <span id="level">1</span></div>
        <div class="score-board">High: <span id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <div></div><button onclick="changeDir(0, -1)">▲</button><div></div>
        <button onclick="changeDir(-1, 0)">◀</button><button onclick="changeDir(0, 1)">▼</button><button onclick="changeDir(1, 0)">▶</button>
    </div>
</div>

<footer style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Built with <a href="https://forge-app.vercel.app" style="color:var(--accent);text-decoration:none">FORGE</a></footer>

<script>
    const KEY = 'forge-snake-v1';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const highScoreEl = document.getElementById('highScore');

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 0, dy = 0;
    let score = 0;
    let level = 1;
    let highScore = parseInt(localStorage.getItem(KEY) || 0);

    highScoreEl.innerText = highScore;

    function spawnFood() {
        let isValid = false;
        while (!isValid) {
            let x = Math.floor(Math.random() * 20);
            let y = Math.floor(Math.random() * 20);
            if (!snake.some(s => s.x === x && s.y === y)) {
                food = {x, y};
                isValid = true;
            }
        }
    }

    function getSpeed() {
        return Math.max(50, 150 - (level - 1) * 15);
    }

    function draw() {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ef4444';
        ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        
        if (dx !== 0 || dy !== 0) {
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) {
                score = 0;
                level = 1;
                snake = [{x: 10, y: 10}];
                dx = 0; dy = 0;
                updateStats();
                spawnFood();
            } else {
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    level = Math.floor(score / 5) + 1;
                    if(score > highScore) { highScore = score; localStorage.setItem(KEY, highScore); }
                    updateStats();
                    spawnFood();
                } else {
                    snake.pop();
                }
            }
        }

        ctx.fillStyle = '#3b82f6';
        snake.forEach(s => ctx.fillRect(s.x * 20, s.y * 20, 18, 18));
        
        setTimeout(draw, getSpeed());
    }

    function updateStats() {
        scoreEl.innerText = score;
        levelEl.innerText = level;
        highScoreEl.innerText = highScore;
    }

    function changeDir(x, y) {
        // Prevent 180 degree turns
        if ((dx !== 0 && x === -dx) || (dy !== 0 && y === -dy)) return;
        dx = x; dy = y;
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'ArrowUp') changeDir(0, -1);
        else if(e.key === 'ArrowDown') changeDir(0, 1);
        else if(e.key === 'ArrowLeft') changeDir(-1, 0);
        else if(e.key === 'ArrowRight') changeDir(1, 0);
    });

    spawnFood();
    draw();
</script>
</body>
</html>
