<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE PDF Splitter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg:#0a0a0a; --s1:#111111; --s2:#1a1a1a; --s3:#242424; --border:#1e293b;
            --text:#f1f5f9; --muted:#64748b; --accent:#3b82f6; --accent-h:#2563eb;
            --danger:#ef4444; --success:#22c55e; --warning:#f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 40px; }
        header { background: var(--s1); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .controls { background: var(--s2); padding: 1rem 2rem; display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .btn { background: var(--s3); color: var(--text); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; transition: 150ms; font-size: 14px; font-weight: 500; }
        .btn:hover { background: var(--border); }
        .btn-accent { background: var(--accent); border: none; }
        .btn-accent:hover { background: var(--accent-h); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; padding: 2rem; }
        .card { background: var(--s1); border: 2px solid var(--border); border-radius: 8px; padding: 0.5rem; cursor: pointer; transition: 150ms; position: relative; }
        .card.selected { border-color: var(--accent); }
        .card img { width: 100%; height: auto; border-radius: 4px; display: block; }
        .card p { margin-top: 0.5rem; font-size: 12px; text-align: center; color: var(--muted); }
        #dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; border: 2px dashed var(--border); margin: 2rem; border-radius: 12px; color: var(--muted); }
        input[type="text"] { background: var(--s1); border: 1px solid var(--border); color: var(--text); padding: 0.5rem; border-radius: 4px; width: 200px; }
        .hidden { display: none !important; }
        .loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.25rem;">FORGE <span style="color:var(--muted)">PDF Splitter</span></h1>
    <div>
        <input type="file" id="fileInput" class="hidden" accept="application/pdf">
        <button class="btn" onclick="document.getElementById('fileInput').click()">Upload PDF</button>
        <button class="btn btn-accent" id="downloadBtn" onclick="processDownload()" disabled>Download Selection</button>
    </div>
</header>

<div class="controls" id="controls" style="display: none;">
    <input type="text" id="rangeInput" placeholder="e.g. 1-3, 5" onchange="applyRange()">
    <button class="btn" onclick="toggleSelection('all')">All</button>
    <button class="btn" onclick="toggleSelection('none')">None</button>
    <button class="btn" onclick="toggleSelection('invert')">Invert</button>
    <span id="pageCount" style="font-size: 14px; color: var(--muted);"></span>
</div>

<div id="dropzone">
    <p>Drop PDF file or click Upload to start</p>
</div>

<div id="grid"></div>

<div id="loader" class="loader hidden">Processing...</div>

<footer style="text-align:center;padding:16px;color:var(--muted);font-size:12px;opacity:0.8;display:flex;justify-content:center;align-items:center;gap:6px"><span>Built with</span> <img src="https://forge-app-peach.vercel.app/logo.png" alt="Forge" style="width:14px;height:14px;border-radius:3px;object-fit:cover;"> <a href="https://forge-app-peach.vercel.app" style="color:var(--accent);text-decoration:none;font-weight:600;letter-spacing:0.05em">FORGE</a></footer>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let pdfDoc = null, pages = [], fileName = "";

    const fileInput = document.getElementById('fileInput');
    const grid = document.getElementById('grid');
    const controls = document.getElementById('controls');
    const loader = document.getElementById('loader');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        fileName = file.name;
        loader.classList.remove('hidden');
        try {
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
            pages = [];
            grid.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 0.5 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport }).promise;
                const pageObj = { pageNumber: i, dataUrl: canvas.toDataURL(), selected: false };
                pages.push(pageObj);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${pageObj.dataUrl}"><p>Page ${i}</p>`;
                card.onclick = () => { pageObj.selected = !pageObj.selected; card.classList.toggle('selected'); updateUI(); };
                grid.appendChild(card);
            }
            document.getElementById('dropzone').classList.add('hidden');
            controls.style.display = 'flex';
            updateUI();
        } catch (e) { alert("Invalid PDF file"); }
        loader.classList.add('hidden');
    };

    function updateUI() {
        const count = pages.filter(p => p.selected).length;
        document.getElementById('pageCount').innerText = `${count} pages selected`;
        document.getElementById('downloadBtn').disabled = count === 0;
    }

    function toggleSelection(type) {
        pages.forEach((p, i) => {
            if (type === 'all') p.selected = true;
            if (type === 'none') p.selected = false;
            if (type === 'invert') p.selected = !p.selected;
            grid.children[i].className = `card ${p.selected ? 'selected' : ''}`;
        });
        updateUI();
    }

    function applyRange() {
        const val = document.getElementById('rangeInput').value;
        const nums = val.split(',').map(s => s.trim());
        pages.forEach(p => p.selected = false);
        nums.forEach(n => {
            if (n.includes('-')) {
                const [start, end] = n.split('-').map(Number);
                for (let i = start; i <= end; i++) if (pages[i-1]) pages[i-1].selected = true;
            } else {
                const idx = Number(n);
                if (pages[idx-1]) pages[idx-1].selected = true;
            }
        });
        pages.forEach((p, i) => grid.children[i].className = `card ${p.selected ? 'selected' : ''}`);
        updateUI();
    }

    async function processDownload() {
        loader.classList.remove('hidden');
        const newPdf = await PDFLib.PDFDocument.create();
        const existingPdf = await PDFLib.PDFDocument.load(await (await fetch(URL.createObjectURL(new Blob([await (await fetch(URL.createObjectURL(fileInput.files[0]))).arrayBuffer()])))).arrayBuffer());
        
        for (let p of pages) {
            if (p.selected) {
                const [copied] = await newPdf.copyPages(existingPdf, [p.pageNumber - 1]);
                newPdf.addPage(copied);
            }
        }
        const bytes = await newPdf.save();
        const blob = new Blob([bytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `FORGE_Split_${fileName}`;
        a.click();
        loader.classList.add('hidden');
    }
</script>
</body>
</html>
