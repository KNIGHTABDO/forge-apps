<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE | Password Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --s1: #111111; --s2: #1a1a1a; --s3: #242424;
            --border: #1e293b; --text: #f1f5f9; --muted: #64748b;
            --accent: #3b82f6; --accent-h: #2563eb;
            --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
        }
        body.light {
            --bg: #f8fafc; --s1: #ffffff; --s2: #f1f5f9; --s3: #e2e8f0;
            --border: #cbd5e1; --text: #0f172a; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; transition: background 0.3s; }
        .container { width: 100%; max-width: 450px; background: var(--s1); padding: 24px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        h1 { font-size: 1.1rem; color: var(--accent); }
        .theme-toggle { cursor: pointer; background: var(--s2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; }
        .display-area { background: var(--s2); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; font-family: 'Fira Code', monospace; }
        #password-output { font-size: 1.1rem; word-break: break-all; margin-right: 10px; }
        .btn-copy { cursor: pointer; background: var(--s3); border: none; color: var(--text); padding: 8px; border-radius: 4px; transition: 0.15s; }
        .btn-copy:hover { background: var(--accent); color: white; }
        .strength-bar { height: 6px; width: 100%; background: var(--s3); border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
        #strength-fill { height: 100%; width: 0%; transition: 0.3s; }
        .control-group { margin-bottom: 16px; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
        .btn-generate { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.15s; }
        .btn-generate:hover:not(:disabled) { background: var(--accent-h); }
        .history-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px; }
        .history-list { list-style: none; margin-top: 12px; }
        .history-item { font-family: 'Fira Code', monospace; background: var(--s2); padding: 8px; margin-bottom: 6px; border-radius: 4px; font-size: 0.8rem; color: var(--muted); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>Password Generator</h1>
        <button class="theme-toggle" onclick="toggleTheme()">Light/Dark</button>
    </div>
    <div class="display-area">
        <span id="password-output">Click generate</span>
        <button class="btn-copy" onclick="copyPassword()">Copy</button>
    </div>
    <div class="strength-bar"><div id="strength-fill"></div></div>
    
    <div class="control-group">
        <div class="label-row"><span>Length</span><span id="len-val">16</span></div>
        <input type="range" id="len-range" min="8" max="64" value="16" oninput="updateLen()">
    </div>

    <div class="checkboxes">
        <label class="checkbox-item"><input type="checkbox" id="c-u" checked> Uppercase</label>
        <label class="checkbox-item"><input type="checkbox" id="c-l" checked> Lowercase</label>
        <label class="checkbox-item"><input type="checkbox" id="c-n" checked> Numbers</label>
        <label class="checkbox-item"><input type="checkbox" id="c-s" checked> Symbols</label>
        <label class="checkbox-item"><input type="checkbox" id="c-e"> Exclude Similar</label>
    </div>

    <button class="btn-generate" onclick="generate()">Generate Password</button>

    <div class="history-section">
        <div class="label-row" style="color:var(--muted)">Recent History</div>
        <div id="history-list" class="history-list"></div>
    </div>
</div>

<footer style="text-align:center;padding:16px;color:var(--muted);font-size:12px;opacity:0.8;display:flex;justify-content:center;align-items:center;gap:6px"><span>Built with</span> <img src="https://forge-app-peach.vercel.app/logo.png" alt="Forge" style="width:14px;height:14px;border-radius:3px;object-fit:cover;"> <a href="https://forge-app-peach.vercel.app" style="color:var(--accent);text-decoration:none;font-weight:600;letter-spacing:0.05em">FORGE</a></footer>

<script>
    const KEY = 'forge-pwd-gen-v1';
    let history = JSON.parse(localStorage.getItem(KEY) || '[]');

    function updateLen() { document.getElementById('len-val').innerText = document.getElementById('len-range').value; }

    function toggleTheme() { document.body.classList.toggle('light'); }

    function generate() {
        const len = parseInt(document.getElementById('len-range').value);
        const u = document.getElementById('c-u').checked;
        const l = document.getElementById('c-l').checked;
        const n = document.getElementById('c-n').checked;
        const s = document.getElementById('c-s').checked;
        const e = document.getElementById('c-e').checked;

        if(!u && !l && !n && !s) return alert("Select at least one character type");

        let chars = "";
        if(u) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if(l) chars += "abcdefghijklmnopqrstuvwxyz";
        if(n) chars += "0123456789";
        if(s) chars += "!@#$%^&*()_+-=[]{}|;:,.<>?";
        if(e) chars = chars.replace(/[0OIl]/g, '');

        const arr = new Uint32Array(len);
        window.crypto.getRandomValues(arr);
        let pwd = "";
        for(let i=0; i<len; i++) pwd += chars[arr[i] % chars.length];

        document.getElementById('password-output').innerText = pwd;
        updateStrength(pwd);
        
        history.unshift(pwd);
        if(history.length > 10) history.pop();
        localStorage.setItem(KEY, JSON.stringify(history));
        renderHistory();
    }

    function updateStrength(pwd) {
        const fill = document.getElementById('strength-fill');
        const score = Math.min(pwd.length / 32 * 100, 100);
        fill.style.width = score + '%';
        fill.style.background = score < 30 ? 'var(--danger)' : score < 70 ? 'var(--warning)' : 'var(--success)';
    }

    function copyPassword() {
        const text = document.getElementById('password-output').innerText;
        if(text === 'Click generate') return;
        navigator.clipboard.writeText(text);
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = history.length ? history.map(h => `<div class="history-item">${h}</div>`).join('') : '<div style="color:var(--muted);font-size:0.8rem">No history yet</div>';
    }

    renderHistory();
</script>
</body>
</html>
