<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure Password Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        :root {
            --bg:#0a0a0a; --s1:#111111; --s2:#1a1a1a; --s3:#242424; --border:#1e293b;
            --text:#f1f5f9; --muted:#64748b; --accent:#3b82f6; --accent-h:#2563eb;
            --danger:#ef4444; --success:#22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: var(--s1); border: 1px solid var(--border); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        h1 { font-size: 1.25rem; margin-top: 0; color: var(--text); }
        .display-area { background: var(--s2); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); margin: 1.5rem 0; text-align: center; font-family: monospace; font-size: 1.5rem; word-break: break-all; min-height: 2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .display-area:hover { border-color: var(--accent); }
        .controls { display: flex; flex-direction: column; gap: 1rem; }
        .control-row { display: flex; justify-content: space-between; align-items: center; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        button { background: var(--accent); color: white; border: none; padding: 0.75rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.15s; }
        button:hover { background: var(--accent-h); }
        .checkbox-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        label { font-size: 0.875rem; color: var(--muted); cursor: pointer; }
        .hint { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Password Generator</h1>
    <div id="passwordDisplay" class="display-area" onclick="copyPassword()">Click to generate</div>
    
    <div class="controls">
        <label>Length: <span id="lenVal">16</span></label>
        <input type="range" id="length" min="4" max="64" value="16" oninput="updateLen()">
        
        <div class="checkbox-group">
            <label><input type="checkbox" id="upper" checked> A-Z</label>
            <label><input type="checkbox" id="lower" checked> a-z</label>
            <label><input type="checkbox" id="numbers" checked> 0-9</label>
            <label><input type="checkbox" id="symbols" checked> !@#</label>
        </div>
        
        <button onclick="generate()">Generate Password</button>
    </div>
    <div class="hint" id="status">Click password to copy to clipboard</div>
</div>

<footer style="text-align:center;padding:16px;color:var(--muted);font-size:12px;opacity:0.8;display:flex;justify-content:center;align-items:center;gap:6px"><span>Built with</span> <img src="https://forge-app.vercel.app/logo.png" alt="Forge" style="width:14px;height:14px;border-radius:3px;object-fit:cover;"> <a href="https://forge-app.vercel.app" style="color:var(--accent);text-decoration:none;font-weight:600;letter-spacing:0.05em">FORGE</a></footer>

<script>
    const KEY = 'forge-passgen-v1';
    
    const load = () => JSON.parse(localStorage.getItem(KEY)) || { len: 16, upper: true, lower: true, numbers: true, symbols: true };
    const save = (d) => localStorage.setItem(KEY, JSON.stringify(d));

    const init = () => {
        const config = load();
        document.getElementById('length').value = config.len;
        document.getElementById('lenVal').innerText = config.len;
        document.getElementById('upper').checked = config.upper;
        document.getElementById('lower').checked = config.lower;
        document.getElementById('numbers').checked = config.numbers;
        document.getElementById('symbols').checked = config.symbols;
        generate();
    };

    function updateLen() {
        const len = document.getElementById('length').value;
        document.getElementById('lenVal').innerText = len;
        saveConfig();
    }

    function saveConfig() {
        save({
            len: document.getElementById('length').value,
            upper: document.getElementById('upper').checked,
            lower: document.getElementById('lower').checked,
            numbers: document.getElementById('numbers').checked,
            symbols: document.getElementById('symbols').checked
        });
    }

    function generate() {
        saveConfig();
        const len = document.getElementById('length').value;
        const useUpper = document.getElementById('upper').checked;
        const useLower = document.getElementById('lower').checked;
        const useNums = document.getElementById('numbers').checked;
        const useSyms = document.getElementById('symbols').checked;

        let charset = "";
        if (useUpper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (useLower) charset += "abcdefghijklmnopqrstuvwxyz";
        if (useNums) charset += "0123456789";
        if (useSyms) charset += "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        if (!charset) {
            document.getElementById('passwordDisplay').innerText = "Select an option";
            return;
        }

        let password = "";
        const array = new Uint32Array(len);
        window.crypto.getRandomValues(array);
        for (let i = 0; i < len; i++) {
            password += charset[array[i] % charset.length];
        }
        document.getElementById('passwordDisplay').innerText = password;
        document.getElementById('status').innerText = "Click password to copy to clipboard";
    }

    function copyPassword() {
        const p = document.getElementById('passwordDisplay').innerText;
        navigator.clipboard.writeText(p).then(() => {
            document.getElementById('status').innerText = "Copied!";
            setTimeout(() => document.getElementById('status').innerText = "Click password to copy to clipboard", 2000);
        });
    }

    window.onload = init;
</script>
</body>
</html>
