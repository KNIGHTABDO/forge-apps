<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FORGE | Stream Dashboard</title>
    <style>
        :root {
            --bg: #0a0a0a; --s1: #111111; --s2: #1a1a1a; --s3: #242424; --border: #1e293b;
            --text: #f1f5f9; --muted: #64748b; --accent: #e50914; --accent-h: #b80710;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { padding: 20px 4%; display: flex; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%); position: fixed; width: 100%; z-index: 100; box-sizing: border-box; }
        .logo { color: var(--accent); font-weight: 800; font-size: 24px; letter-spacing: -1px; margin-right: 30px; }
        .hero { height: 70vh; background: linear-gradient(to right, #000 10%, transparent 80%), url('https://picsum.photos/1600/900?random=1'); background-size: cover; display: flex; align-items: center; padding: 0 4%; }
        .content-row { padding: 20px 4%; }
        .row-title { font-size: 1.2rem; margin-bottom: 15px; }
        .slider { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .slider::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 200px; height: 300px; background: var(--s2); border-radius: 4px; position: relative; cursor: pointer; transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: 600; cursor: pointer; }
        button:hover { background: var(--accent-h); }
        .my-list { position: fixed; bottom: 20px; right: 20px; background: var(--s3); padding: 15px; border-radius: 8px; border: 1px solid var(--border); width: 250px; }
    </style>
</head>
<body>

<header>
    <div class="logo">FORGEFLIX</div>
</header>

<div class="hero">
    <div>
        <h1>Featured Content</h1>
        <p style="max-width: 500px; color: #ddd; margin-bottom: 20px;">Stream the latest hits and classic cinema. Personalized for you based on your history.</p>
        <button onclick="alert('Playing feature...')">Play</button>
    </div>
</div>

<div class="content-row">
    <div class="row-title">Trending Now</div>
    <div class="slider" id="trending-list"></div>
</div>

<div class="my-list">
    <h3>My List</h3>
    <div id="list-items" style="font-size: 0.9rem; color: var(--muted);"></div>
    <button style="width: 100%; margin-top: 10px; font-size: 0.8rem;" onclick="exportList()">Export List CSV</button>
</div>

<footer style="text-align:center;padding:16px;color:var(--muted);font-size:12px;opacity:0.8;display:flex;justify-content:center;align-items:center;gap:6px"><span>Built with</span> <img src="https://forge-app-peach.vercel.app/logo.png" alt="Forge" style="width:14px;height:14px;border-radius:3px;object-fit:cover;"> <a href="https://forge-app-peach.vercel.app" style="color:var(--accent);text-decoration:none;font-weight:600;letter-spacing:0.05em">FORGE</a></footer>

<script>
    const KEY = 'forge-netflix-v1';
    let myList = JSON.parse(localStorage.getItem(KEY) || '[]');

    const movies = [
        {id: 1, title: 'Inception', img: 'https://picsum.photos/400/600?random=1'},
        {id: 2, title: 'Interstellar', img: 'https://picsum.photos/400/600?random=2'},
        {id: 3, title: 'The Batman', img: 'https://picsum.photos/400/600?random=3'},
        {id: 4, title: 'Dune', img: 'https://picsum.photos/400/600?random=4'},
        {id: 5, title: 'Joker', img: 'https://picsum.photos/400/600?random=5'}
    ];

    function toggleList(movie) {
        const idx = myList.findIndex(m => m.id === movie.id);
        if (idx > -1) myList.splice(idx, 1);
        else myList.push(movie);
        localStorage.setItem(KEY, JSON.stringify(myList));
        render();
    }

    function render() {
        const container = document.getElementById('trending-list');
        const listDiv = document.getElementById('list-items');
        container.innerHTML = '';
        listDiv.innerHTML = myList.length ? '' : 'No items added yet.';

        movies.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${m.img}" onclick="toggleList(${JSON.stringify(m).replace(/"/g, '&quot;')})">`;
            container.appendChild(card);
        });

        myList.forEach(m => {
            const item = document.createElement('div');
            item.style.padding = '5px 0';
            item.textContent = `+ ${m.title}`;
            listDiv.appendChild(item);
        });
    }

    function exportList() {
        let csv = 'Title\n' + myList.map(m => m.title).join('\n');
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'my-list.csv';
        a.click();
    }

    render();
</script>
</body>
</html>
