<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forge Pomodoro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0a0a; --s1:#111111; --s2:#1a1a1a; --s3:#242424; --border:#1e293b;
            --text:#f1f5f9; --muted:#64748b; --accent:#3b82f6; --accent-h:#2563eb;
            --danger:#ef4444; --success:#22c55e;
        }
        [data-theme='light'] {
            --bg:#f8fafc; --s1:#ffffff; --s2:#f1f5f9; --s3:#e2e8f0; --border:#cbd5e1;
            --text:#0f172a; --muted:#64748b; --accent:#2563eb; --accent-h:#1d4ed8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background 0.3s; }
        .container { width: 100%; max-width: 400px; background: var(--s1); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); transition: background 0.3s; }
        .timer-display { font-size: 5rem; font-weight: 600; text-align: center; margin: 1rem 0; font-variant-numeric: tabular-nums; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 2rem; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 6px; border: none; font-weight: 600; transition: 0.15s; background: var(--s3); color: var(--text); }
        button:hover { background: var(--border); }
        button.primary { background: var(--accent); color: white; }
        button.primary:hover { background: var(--accent-h); }
        .settings { border-top: 1px solid var(--border); padding-top: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .setting-field { display: flex; flex-direction: column; gap: 5px; }
        input { background: var(--s2); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; }
        label { font-size: 0.8rem; color: var(--muted); }
        .theme-toggle { position: absolute; top: 20px; right: 20px; padding: 8px; }
    </style>
</head>
<body>

<button id="themeBtn" class="theme-toggle">Toggle Mode</button>

<div class="container">
    <div id="status" style="text-align:center; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-size:0.8rem">Work</div>
    <div class="timer-display" id="display">25:00</div>
    <div class="controls">
        <button id="startBtn" class="primary">Start</button>
        <button id="resetBtn">Reset</button>
    </div>
    <div class="settings">
        <div class="setting-field">
            <label>Work (min)</label>
            <input type="number" id="workInput" value="25">
        </div>
        <div class="setting-field">
            <label>Break (sec)</label>
            <input type="number" id="breakInput" value="300">
        </div>
    </div>
</div>

<footer style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Built with <a href="https://forge-app.vercel.app" style="color:var(--accent);text-decoration:none">FORGE</a></footer>

<script>
    const KEY = 'forge-pomodoro-v1';
    let timeLeft, timerId = null, isWork = true;
    
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const workInput = document.getElementById('workInput');
    const breakInput = document.getElementById('breakInput');
    const status = document.getElementById('status');
    const themeBtn = document.getElementById('themeBtn');

    const load = () => JSON.parse(localStorage.getItem(KEY)) || { work: 25, breakSec: 300, theme: 'dark' };
    const save = () => localStorage.setItem(KEY, JSON.stringify({ 
        work: parseInt(workInput.value), 
        breakSec: parseInt(breakInput.value),
        theme: document.body.dataset.theme || 'dark'
    }));

    function updateDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function toggleTimer() {
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            startBtn.textContent = 'Start';
        } else {
            startBtn.textContent = 'Pause';
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    alert(isWork ? "Work complete! Take a break." : "Break over! Back to work.");
                    isWork = !isWork;
                    reset();
                }
            }, 1000);
        }
    }

    function reset() {
        clearInterval(timerId);
        timerId = null;
        startBtn.textContent = 'Start';
        const settings = load();
        timeLeft = isWork ? (settings.work * 60) : settings.breakSec;
        status.textContent = isWork ? "Work" : "Break";
        updateDisplay();
    }

    themeBtn.addEventListener('click', () => {
        const newTheme = document.body.dataset.theme === 'light' ? 'dark' : 'light';
        document.body.dataset.theme = newTheme;
        save();
    });

    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', () => { isWork = true; reset(); });
    workInput.addEventListener('change', () => { save(); reset(); });
    breakInput.addEventListener('change', () => { save(); reset(); });

    const settings = load();
    workInput.value = settings.work;
    breakInput.value = settings.breakSec;
    document.body.dataset.theme = settings.theme;
    reset();
</script>
</body>
</html>
