<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recipe Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0a0a; --s1:#111111; --s2:#1a1a1a; --s3:#242424; --border:#1e293b;
            --text:#f1f5f9; --muted:#64748b; --accent:#3b82f6; --accent-h:#2563eb;
            --danger:#ef4444; --success:#22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--s1); border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h1, h2 { margin-top: 0; }
        input, textarea { width: 100%; box-sizing: border-box; background: var(--s2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        button { cursor: pointer; border: none; padding: 10px 16px; border-radius: 4px; background: var(--accent); color: white; font-weight: 600; }
        button:hover { background: var(--accent-h); }
        .recipe-item { border-bottom: 1px solid var(--border); padding: 15px 0; }
        .recipe-item:last-child { border: none; }
        .delete-btn { background: var(--danger); font-size: 12px; margin-top: 10px; }
        .search-bar { margin-bottom: 20px; }
        .empty { color: var(--muted); text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recipe Book</h1>
        <div class="card">
            <input type="text" id="recipeName" placeholder="Recipe Name">
            <textarea id="recipeIngredients" rows="3" placeholder="Ingredients (one per line)"></textarea>
            <textarea id="recipeSteps" rows="3" placeholder="Steps"></textarea>
            <button onclick="addRecipe()">Add Recipe</button>
        </div>

        <input type="text" id="search" class="search-bar" placeholder="Search recipes..." oninput="render()">

        <div id="recipeList"></div>
    </div>

    <footer style="text-align:center;padding:16px;color:var(--muted);font-size:12px;opacity:0.8;display:flex;justify-content:center;align-items:center;gap:6px"><span>Built with</span> <img src="https://forge-app.vercel.app/logo.png" alt="Forge" style="width:14px;height:14px;border-radius:3px;object-fit:cover;"> <a href="https://forge-app.vercel.app" style="color:var(--accent);text-decoration:none;font-weight:600;letter-spacing:0.05em">FORGE</a></footer>

    <script>
        const KEY = 'forge-recipebook-v1';
        let recipes = JSON.parse(localStorage.getItem(KEY) || '[]');

        function save() { localStorage.setItem(KEY, JSON.stringify(recipes)); render(); }

        function addRecipe() {
            const name = document.getElementById('recipeName').value;
            const ingredients = document.getElementById('recipeIngredients').value;
            const steps = document.getElementById('recipeSteps').value;
            if(!name) return;
            recipes.push({ id: Date.now(), name, ingredients, steps });
            document.getElementById('recipeName').value = '';
            document.getElementById('recipeIngredients').value = '';
            document.getElementById('recipeSteps').value = '';
            save();
        }

        function deleteRecipe(id) {
            recipes = recipes.filter(r => r.id !== id);
            save();
        }

        function render() {
            const list = document.getElementById('recipeList');
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = recipes.filter(r => r.name.toLowerCase().includes(search));
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty">No recipes found.</div>';
                return;
            }

            list.innerHTML = filtered.map(r => `
                <div class="card recipe-item">
                    <h3>${r.name}</h3>
                    <strong>Ingredients:</strong><p style="white-space:pre-wrap; font-size: 14px; color: var(--muted)">${r.ingredients}</p>
                    <strong>Steps:</strong><p style="white-space:pre-wrap; font-size: 14px; color: var(--muted)">${r.steps}</p>
                    <button class="delete-btn" onclick="deleteRecipe(${r.id})">Delete</button>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
